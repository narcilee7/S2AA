name: ci

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download deps
        run: go mod download

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build all
        run: go build ./...

      - name: Test
        run: go test -race -v ./...

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Verify generated code is up-to-date
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          rm -rf api/sandboxpb
          mkdir -p api/sandboxpb
          protoc --go_out=./api/sandboxpb --go_opt=module=github.com/narcilee7/S2AA --go-grpc_out=./api/sandboxpb --go-grpc_opt=module=github.com/narcilee7/S2AA api/sandbox.proto
          # Flatten nested dirs produced by some protoc versions
          if [ -d api/sandboxpb/sandboxpb ]; then
            mv api/sandboxpb/sandboxpb/* api/sandboxpb/
            rmdir api/sandboxpb/sandboxpb || true
          fi
          git diff --exit-code api/sandboxpb
