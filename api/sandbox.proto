syntax = "proto3";

package s2aa.sandbox;
option go_package = "github.com/narcilee7/S2AA/api/sandboxpb";

import "google/protobuf/empty.proto";

// SandboxService is exposed inside the microVM guest and reachable from the host via vsock.
service SandboxService {
  // Execute runs a command synchronously and returns the full result.
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);

  // ExecuteStream runs a command and streams stdout, stderr, progress and the final result back.
  rpc ExecuteStream(ExecuteRequest) returns (stream StreamChunk);

  // Cancel attempts to cancel a running command.
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Filesystem operations
  rpc ReadFile(FileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (FileResponse);
  rpc ListFiles(FileRequest) returns (ListFilesResponse);
  rpc DeleteFile(FileRequest) returns (FileResponse);
  rpc MkdirAll(MkdirRequest) returns (FileResponse);
  rpc Stat(FileRequest) returns (StatResponse);

  // Port exposure
  rpc ExposePort(PortRequest) returns (PortResponse);

  // Status
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

message ExecuteRequest {
  string command_id = 1;
  string exec = 2;
  repeated string args = 3;
  repeated string env = 4;
  string working_dir = 5;
  bytes stdin = 6;
  int64 timeout_ms = 7;
}

message ExecuteResponse {
  string command_id = 1;
  int32 exit_code = 2;
  bool success = 3;
  bytes stdout = 4;
  bytes stderr = 5;
  string error = 6;
  int64 duration_ms = 7;
}

message StreamChunk {
  oneof payload {
    bytes stdout = 1;
    bytes stderr = 2;
    double progress = 3;
    ExecuteResponse result = 4;
  }
}

message CancelRequest {
  string command_id = 1;
}

message CancelResponse {
  bool success = 1;
}

message FileRequest {
  string path = 1;
}

message ReadFileResponse {
  bool success = 1;
  string error = 2;
  bytes data = 3;
}

message WriteFileRequest {
  string path = 1;
  bytes data = 2;
  uint32 mode = 3;
}

message MkdirRequest {
  string path = 1;
  uint32 mode = 2;
}

message FileResponse {
  bool success = 1;
  string error = 2;
}

message FileInfoMsg {
  string name = 1;
  string path = 2;
  int64 size = 3;
  uint32 mode = 4;
  int64 mod_time_unix = 5;
  bool is_dir = 6;
}

message ListFilesResponse {
  bool success = 1;
  string error = 2;
  repeated FileInfoMsg entries = 3;
}

message StatResponse {
  bool success = 1;
  string error = 2;
  FileInfoMsg info = 3;
}

message PortRequest {
  int32 container_port = 1;
}

message PortResponse {
  bool success = 1;
  string error = 2;
  int32 host_port = 3;
  string public_url = 4;
}

message StatusRequest {
  string sandbox_id = 1;
}

message StatusResponse {
  string state = 1;
  int32 active_tasks = 2;
  int64 uptime_ms = 3;
}
